version: '3.8'

services:
  avry_diagnostics:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avry-diagnostics
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aivory-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.avry-diagnostics.rule=Host(`backend.aivory.id`) && PathPrefix(`/diagnostics`)"
      - "traefik.http.routers.avry-diagnostics.entrypoints=websecure"
      - "traefik.http.routers.avry-diagnostics.tls.certresolver=letsencrypt"
      - "traefik.http.services.avry-diagnostics.loadbalancer.server.port=8082"

networks:
  aivory-network:
    name: aivory-network
    external: true
